<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imashiru - プログラミング図鑑＆復習録</title>
    <link rel="stylesheet" href="../css/destyle.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="light_theme">
    <div id="header-placeholder"></div>
    <div id="user_info_bar"></div>

    <main>
        <div class="breadcrumb"><a href="index.html">HOME</a> >> プログラミング図鑑＆復習録</div>
        <section class="introduction">
            <h2>アルゴリズム道場 -基本情報B問題特化-</h2>
            <h2>プログラミング図鑑＆復習録</h2>
            <p>これまでに解いた問題の記録を振り返り、弱点を克服しましょう。すべてのカードを「完全習得（金枠）」に染め上げることが目標です。</p>
        </section>

        <div id="filter-controls"
            style="margin-bottom: 20px; padding: 15px; border: 1px solid #333; background-color: #fff;">
            <strong style="display: block; margin-bottom: 10px;">【表示フィルター】</strong>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="filter-btn" data-filter="all"
                    style="padding: 6px 16px; border: 1px solid #333; background-color: #333; color: #fff; cursor: pointer; font-weight: bold;">すべて表示</button>
                <button class="filter-btn" data-filter="card-gold"
                    style="padding: 6px 16px; border: 1px solid #333; background-color: #fff; color: #333; cursor: pointer;">金枠
                    (完全習得)</button>
                <button class="filter-btn" data-filter="card-green"
                    style="padding: 6px 16px; border: 1px solid #333; background-color: #fff; color: #333; cursor: pointer;">緑枠
                    (習得中)</button>
                <button class="filter-btn" data-filter="card-red"
                    style="padding: 6px 16px; border: 1px solid #333; background-color: #fff; color: #333; cursor: pointer;">赤枠
                    (要復習)</button>
                <button class="filter-btn" data-filter="card-unattempted"
                    style="padding: 6px 16px; border: 1px solid #333; background-color: #fff; color: #333; cursor: pointer;">未着手</button>
            </div>
        </div>

        <div id="encyclopedia-container"></div>
    </main>

    <div id="footer-placeholder"></div>

    <div id="explanation_modal" class="modal" style="display: none;">
        <div class="modal_content">
            <h2 id="modal_title">Loading...</h2>
            <div id="modal_body"></div>
            <button id="close_modal_btn" class="next_btn" style="margin-top: 20px;">閉じる ✖</button>
        </div>
    </div>

    <script src="../js/makeHeader.js"></script>
    <script src="../js/makeFooter.js"></script>
    <script src="../js/makeUser_info_bar.js"></script>
    <script src="../js/user_manager.js"></script>
    <script src="../short_questions/questions.js"></script>
    <script src="../js/encyclopedia.js"></script>
</body>

</html>
